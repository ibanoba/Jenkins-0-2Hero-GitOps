apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-webapp
  namespace: java-webapp
  labels:
    app: java-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-webapp
  template:
    metadata:
      labels:
        app: java-webapp
    spec:
      containers:
      - name: java-webapp
        image: abhishekf5/ultimate-cicd:21 # rslim087/kubernetes-course-grade-submission-api:stateless
        ports:
          - containerPort: 3000

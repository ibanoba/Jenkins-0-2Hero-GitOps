apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-webapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ibanoba/Jenkins-0-2Hero-GitOps.git
    targetRevision: HEAD
    path: gitops/basic
  destination:
    server: https://kubernetes.default.svc
    namespace: java-webapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jave-webapp-helm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ibanoba/Jenkins-0-2Hero-GitOps.git
    targetRevision: HEAD
    path: helm/java-webapp
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jvwebapp-helm-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true